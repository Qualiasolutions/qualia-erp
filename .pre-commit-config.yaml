# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, master, --branch, main]

  # JavaScript/TypeScript linting
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npx eslint
        language: system
        types: [file]
        files: \.(js|jsx|ts|tsx)$
        args: [--fix, --max-warnings=0]
        pass_filenames: true
        require_serial: false
        additional_dependencies: []

  # Prettier formatting
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: npx prettier
        language: system
        types_or: [css, scss, json, yaml, markdown, html]
        args: [--write, --ignore-unknown]
        pass_filenames: true
        require_serial: false

  # TypeScript type checking
  - repo: local
    hooks:
      - id: typescript
        name: TypeScript Check
        entry: npx tsc
        language: system
        types: [file]
        files: \.(ts|tsx)$
        args: [--noEmit, --skipLibCheck]
        pass_filenames: false
        require_serial: true

  # Security scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint-fix
        args: [--config, .markdownlint.json]
        exclude: CHANGELOG.md

  # Commit message linting
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.30.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Package.json sorting
  - repo: https://github.com/npmpackagejsonlint/npmpackagejsonlint
    rev: v3.0.0
    hooks:
      - id: npmpackagejsonlint
        files: package\.json$
        args: [--config, .npmpackagejsonlintrc.json]

  # License header check
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: insert-license
        files: \.(js|jsx|ts|tsx)$
        args:
          - --license-filepath
          - .license-header.txt
          - --comment-style
          - //
        exclude: |
          (?x)^(
            .*\.config\.(js|ts)|
            .*\.setup\.(js|ts)|
            node_modules/.*|
            \.next/.*|
            __tests__/.*
          )$

  # SQL linting (for Supabase migrations)
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.0
    hooks:
      - id: sqlfluff-lint
        files: \.(sql)$
        args: [--dialect, postgres]
      - id: sqlfluff-fix
        files: \.(sql)$
        args: [--dialect, postgres]

# Local hooks
  - repo: local
    hooks:
      # Run tests on commit
      - id: run-tests
        name: Run Tests
        entry: npm test -- --passWithNoTests --watchAll=false
        language: system
        stages: [commit]
        pass_filenames: false
        always_run: true

      # Check for console.log statements
      - id: no-console-log
        name: Check for console.log
        entry: sh -c 'grep -r "console\.log" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=__tests__ . && exit 1 || exit 0'
        language: system
        pass_filenames: false

      # Verify no sensitive data
      - id: check-env-files
        name: Check .env files
        entry: sh -c 'test -f .env && echo "ERROR: .env file should not be committed" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      # Update dependencies hash
      - id: update-deps-hash
        name: Update dependencies hash
        entry: sh -c 'npm ls --json > .deps-hash.json || true'
        language: system
        pass_filenames: false
        stages: [commit]

      # Generate TypeScript declaration files
      - id: generate-types
        name: Generate TypeScript types
        entry: npx tsc --emitDeclarationOnly --declaration --declarationMap
        language: system
        types: [typescript]
        pass_filenames: false
        stages: [commit]